<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DO 控制面板</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <h1>DigitalOcean 控制面板</h1>
      </div>
    </header>

    <main class="container page">
      <section class="stats-grid">
        <article class="stat-card">
          <p class="stat-label">总机器数</p>
          <p id="statTotal" class="stat-value">0</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">运行中</p>
          <p id="statActive" class="stat-value">0</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">非运行状态</p>
          <p id="statInactive" class="stat-value">0</p>
        </article>
        <article class="stat-card stat-card-credits">
          <p class="stat-label">Available Credits</p>
          <p id="statCredits" class="stat-value">$0.00</p>
          <p id="statCreditsSub" class="stat-note" hidden></p>
          <p id="statCreditsMeta" class="stat-meta">每 15 秒自动刷新</p>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>创建机器</h2>
          <p class="subtle">地区可选：San Francisco (sfo3) / Singapore (sgp1) / Bangalore (blr1) · 型号实时拉取并自动排序（仅显示学生包可创建） · Ubuntu 22.04</p>
        </div>
        <form id="createForm" class="form-grid">
          <label>
            地区
            <select id="createRegion" name="region">
              <option value="sfo3">San Francisco (sfo3)</option>
              <option value="sgp1" selected>Singapore (sgp1)</option>
              <option value="blr1">Bangalore (blr1)</option>
            </select>
          </label>
          <label>
            名称
            <input id="createName" name="name" type="text" placeholder="例如 web-prod-1" required />
          </label>
          <label>
            标签（逗号分隔）
            <input id="createTags" name="tags" type="text" placeholder="例如 web,prod,api" />
          </label>
          <label>
            搜索热门型号
            <input id="createSizeQuery" name="sizeQuery" type="text" placeholder="例如 2gb / 4vcpu / s-2vcpu-4gb" />
          </label>
          <label>
            型号
            <select id="createSize" name="size"></select>
          </label>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">创建机器</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="table-head">
          <h2>当前机器</h2>
          <div class="table-tools">
            <label class="filter-inline">
              标签筛选
              <select id="tagFilter"></select>
            </label>
            <button id="deleteByTagBtn" class="danger btn" type="button">删除当前标签机器</button>
            <button id="refreshBtn" class="btn btn-secondary" type="button">刷新列表</button>
          </div>
        </div>
        <p id="status" class="status"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>名称</th>
                <th>状态</th>
                <th>公网 IP</th>
                <th>Region</th>
                <th>Size</th>
                <th>Image</th>
                <th>标签</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="dropletTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
